<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro & Vitrine | Fashion Sport</title>
    <style>
        :root {
            --primary-color: #111;
            --accent-color: #ff4757;
            --bg-color: #f1f2f6;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Estilos do Formulário (Resumidos) */
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            margin-bottom: 40px;
        }

        h2 { text-align: center; color: var(--primary-color); text-transform: uppercase; margin-bottom: 25px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn-submit {
            grid-column: span 2;
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-submit:hover { background-color: #333; }

        /* Estilos da Vitrine de Marcas */
        .showcase-title {
            margin: 40px 0 20px;
            text-align: center;
        }

        .vitrine {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            text-align: center;
        }

        .card:hover { transform: translateY(-5px); }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card-info { padding: 15px; }
        .brand-tag {
            font-size: 12px;
            font-weight: bold;
            color: #777;
            text-transform: uppercase;
        }
        .product-name {
            font-size: 18px;
            margin: 5px 0;
            color: #222;
        }
        .price { color: var(--accent-color); font-weight: bold; font-size: 20px; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .btn-submit { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Fazer Parte da Comunidade</h2>
        <form action="#">
            <div class="form-grid">
                <div style="grid-column: span 2;">
                    <label>Nome Completo</label>
                    <input type="text" placeholder="Nome do cliente" required>
                </div>
                <div>
                    <label>E-mail</label>
                    <input type="email" placeholder="email@exemplo.com" required>
                </div>
                <div>
                    <label>Telefone</label>
                    <input type="tel" placeholder="(00) 00000-0000">
                </div>
                <div>
                    <label>Marca Favorita</label>
                    <select>
                        <option>Nike</option>
                        <option>Adidas</option>
                        <option>Outras</option>
                    </select>
                </div>
                <div>
                    <label>Tamanho</label>
                    <select>
                        <option>P</option>
                        <option>M</option>
                        <option>G</option>
                        <option>GG</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">CADASTRAR AGORA</button>
            </div>
        </form>
    </div>

    <h2 class="showcase-title">Destaques Nike & Adidas</h2>
    
    <div class="vitrine">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&q=80&w=400" alt="Nike Air Max">
            <div class="card-info">
                <span class="brand-tag">Nike</span>
                <p class="product-name">Air Max Sport Classic</p>
                <p class="price">R$ 599,90</p>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1520639889456-748995cc6060?auto=format&fit=crop&q=80&w=400" alt="Adidas Jacket">
            <div class="card-info">
                <span class="brand-tag">Adidas</span>
                <p class="product-name">Jaqueta Essentials Track</p>
                <p class="price">R$ 349,90</p>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?auto=format&fit=crop&q=80&w=400" alt="Nike Zoom">
            <div class="card-info">
                <span class="brand-tag">Nike</span>
                <p class="product-name">Nike Zoom Pegasus</p>
                <p class="price">R$ 489,00</p>
            </div>
        </div>
    </div>

</body>
</html>
