<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Produtos | Fashion Store</title>
    <style>
        :root {
            --nike-black: #111;
            --adidas-blue: #0071ae;
            --price-green: #27ae60;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h2 { text-align: center; color: #333; text-transform: uppercase; margin-bottom: 30px; }

        /* Estilo da Vitrine */
        .vitrine {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .card-info {
            margin-top: 15px;
        }

        .brand-label {
            font-size: 12px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            color: white;
            text-transform: uppercase;
        }

        .nike-bg { background-color: var(--nike-black); }
        .adidas-bg { background-color: var(--adidas-blue); }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
            color: #222;
        }

        /* Área de Edição de Valor */
        .price-container {
            background: #f1fcf4;
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed var(--price-green);
        }

        label {
            font-size: 12px;
            color: #666;
            display: block;
        }

        .price-input {
            width: 100%;
            font-size: 20px;
            font-weight: bold;
            color: var(--price-green);
            border: none;
            background: transparent;
            outline: none;
        }

        .btn-save {
            width: 100%;
            background: #333;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save:hover { background: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>Catálogo de Preços (Nike & Adidas)</h2>
    
    <div class="vitrine">
        <div class="card">
            <span class="brand-label nike-bg">Nike</span>
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" alt="Nike">
            <div class="card-info">
                <p class="product-name">Tênis Nike Air Max</p>
                <div class="price-container">
                    <label>Valor da Roupa/Calçado (R$):</label>
                    <input type="text" class="price-input" value="599,90" placeholder="0,00">
                </div>
                <button class="btn-save">Atualizar Preço</button>
            </div>
        </div>

        <div class="card">
            <span class="brand-label adidas-bg">Adidas</span>
            <img src="https://images.unsplash.com/photo-1520639889456-748995cc6060?w=400" alt="Adidas">
            <div class="card-info">
                <p class="product-name">Conjunto Adidas Treino</p>
                <div class="price-container">
                    <label>Valor da Roupa/Calçado (R$):</label>
                    <input type="text" class="price-input" value="349,00" placeholder="0,00">
                </div>
                <button class="btn-save">Atualizar Preço</button>
            </div>
        </div>

        <div class="card">
            <span class="brand-label nike-bg">Nike</span>
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400" alt="Nike Shirt">
            <div class="card-info">
                <p class="product-name">Camiseta Nike Dry-Fit</p>
                <div class="price-container">
                    <label>Valor da Roupa/Calçado (R$):</label>
                    <input type="text" class="price-input" value="129,90" placeholder="0,00">
                </div>
                <button class="btn-save">Atualizar Preço</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
