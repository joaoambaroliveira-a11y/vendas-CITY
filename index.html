<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Store - Checkout Final</title>
    <style>
        :root {
            --nike: #000; --adidas: #0051ba; --mizuno: #cc0000;
            --bg: #f4f7f6; --white: #fff; --success: #27ae60;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }

        /* TELAS */
        .container { padding: 20px; max-width: 1100px; margin: auto; display: none; }
        #login-screen { display: flex; height: 100vh; justify-content: center; align-items: center; }
        
        /* LOGIN CARD */
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }

        /* LOJA E CARRINHO */
        .main-shop { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; }
        
        /* CHECKOUT */
        #checkout-screen { text-align: center; }
        .checkout-box { background: white; padding: 30px; border-radius: 12px; max-width: 500px; margin: auto; }

        /* BOTÕES */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-dark { background: #000; color: white; }
        .btn-success { background: var(--success); color: white; margin-top: 15px; }
        
        .carrinho-float { background: white; padding: 20px; border-radius: 10px; position: sticky; top: 20px; height: fit-content; }
        .item-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="letter-spacing: 2px;">SPORT STORE</h2>
            <input type="text" placeholder="Usuário">
            <input type="password" placeholder="Senha">
            <button class="btn btn-dark" onclick="irParaLoja()">ENTRAR</button>
        </div>
    </div>

    <div id="shop-screen" class="container">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1>Produtos Premium</h1>
            <span id="user-info">Bem-vindo, Atleta!</span>
        </header>

        <div class="main-shop">
            <div class="grid-produtos">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Nike">
                    <h4>Nike Air Sport</h4>
                    <p>R$ 599.00</p>
                    <button class="btn btn-dark" onclick="add('Nike Air Sport', 599)">Adicionar</button>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1518002171953-a080ee817e1f" alt="Adidas">
                    <h4>Blusa Adidas 3S</h4>
                    <p>R$ 249.00</p>
                    <button class="btn btn-dark" onclick="add('Blusa Adidas 3S', 249)">Adicionar</button>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7" alt="Mizuno">
                    <h4>Moletom Mizuno Pro</h4>
                    <p>R$ 380.00</p>
                    <button class="btn btn-dark" onclick="add('Moletom Mizuno Pro', 380)">Adicionar</button>
                </div>
            </div>

            <div class="carrinho-float">
                <h3>Carrinho 🛒</h3>
                <div id="lista-carrinho"></div>
                <hr>
                <p><strong>Total: R$ <span id="total-valor">0</span></strong></p>
                <button class="btn btn-success" onclick="irParaCheckout()">Finalizar Compra</button>
            </div>
        </div>
    </div>

    <div id="checkout-screen" class="container">
        <div class="checkout-box">
            <h2>Finalizar Pedido</h2>
            <div id="resumo-final" style="text-align: left; margin: 20px 0;"></div>
            <hr>
            <label>Forma de Pagamento:</label>
            <select id="pagamento">
                <option>Cartão de Crédito (12x)</option>
                <option>Pix (5% de desconto)</option>
                <option>Boleto Bancário</option>
            </select>
            <button class="btn btn-success" onclick="confirmarCompra()">CONFIRMAR PAGAMENTO</button>
            <button class="btn" style="background: #ccc; margin-top: 10px;" onclick="irParaLoja()">Voltar</button>
        </div>
    </div>

    <div id="success-screen" class="container" style="text-align: center;">
        <div class="checkout-box">
            <h1 style="color: var(--success);">✔</h1>
            <h2>Compra Realizada!</h2>
            <p>O seu pedido já está sendo preparado para envio.</p>
            <button class="btn btn-dark" onclick="location.reload()">Voltar ao Início</button>
        </div>
    </div>

    <script>
        let itens = [];
        let total = 0;

        function mudarTela(id) {
            document.querySelectorAll('.container, #login-screen').forEach(t => t.style.display = 'none');
            document.getElementById(id).style.display = id === 'login-screen' ? 'flex' : 'block';
        }

        function irParaLoja() { mudarTela('shop-screen'); }

        function add(nome, preco) {
            itens.push({nome, preco});
            total += preco;
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            const lista = document.getElementById('lista-carrinho');
            lista.innerHTML = itens.map(i => `<div class="item-row"><span>${i.nome}</span><span>R$ ${i.preco}</span></div>`).join('');
            document.getElementById('total-valor').innerText = total;
        }

        function irParaCheckout() {
            if(itens.length === 0) return alert("Seu carrinho está vazio!");
            mudarTela('checkout-screen');
            const resumo = document.getElementById('resumo-final');
            resumo.innerHTML = `<h4>Seu Resumo:</h4>` + 
                itens.map(i => `<small>${i.nome} - R$ ${i.preco}</small><br>`).join('') +
                `<br><strong>Total a pagar: R$ ${total}</strong>`;
        }

        function confirmarCompra() {
            mudarTela('success-screen');
        }
    </script>
</body>
</html>
