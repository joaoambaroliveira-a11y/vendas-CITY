<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Store PRO</title>
    <style>
        :root {
            --nike: #000; --adidas: #0051ba; --mizuno: #cc0000;
            --bg: #f0f2f5; --white: #fff;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }

        /* TELA LOGIN */
        #login-screen { 
            height: 100vh; display: flex; justify-content: center; align-items: center; width: 100%; 
        }
        .login-box { 
            background: var(--white); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 300px;
        }

        /* LAYOUT DA LOJA */
        #shop-screen { display: none; width: 100%; max-width: 1200px; padding: 20px; box-sizing: border-box; }
        
        .main-container { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }

        .grid-produtos { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; 
        }

        /* CARD PRODUTO */
        .card { 
            background: var(--white); border-radius: 10px; padding: 15px; text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; 
        }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .tag { color: white; padding: 3px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .btn-add { 
            width: 100%; padding: 10px; background: #27ae60; color: white; border: none; 
            border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }

        /* CARRINHO */
        .carrinho { 
            background: var(--white); padding: 20px; border-radius: 10px; 
            height: fit-content; position: sticky; top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .item-carrinho { 
            display: flex; justify-content: space-between; font-size: 0.9rem; 
            border-bottom: 1px solid #eee; padding: 8px 0; 
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>SportStore</h2>
            <input type="email" id="email" placeholder="E-mail" style="width:90%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ddd;">
            <input type="password" id="senha" placeholder="Senha" style="width:90%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ddd;">
            <button onclick="logar()" style="width:100%; padding:12px; background:#000; color:#fff; border:none; border-radius:5px; cursor:pointer;">ENTRAR</button>
        </div>
    </div>

    <div id="shop-screen">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h1>Outlet Premium</h1>
            <button onclick="location.reload()" style="background:none; border:1px solid #000; padding:5px 15px; border-radius:5px; cursor:pointer;">Sair</button>
        </header>

        <div class="main-container">
            <div class="grid-produtos">
                
                <div class="card">
                    <span class="tag" style="background: var(--nike)">NIKE</span>
                    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Nike">
                    <h3>Air Max Red</h3>
                    <p>R$ 799.90</p>
                    <button class="btn-add" onclick="addCarrinho('Air Max Red', 799.90)">Adicionar</button>
                </div>

                <div class="card">
                    <span class="tag" style="background: var(--nike)">NIKE</span>
                    <img src="https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa" alt="Nike">
                    <h3>Nike Zoom Blue</h3>
                    <p>R$ 650.00</p>
                    <button class="btn-add" onclick="addCarrinho('Nike Zoom Blue', 650.00)">Adicionar</button>
                </div>

                <div class="card">
                    <span class="tag" style="background: var(--adidas)">ADIDAS</span>
                    <img src="https://images.unsplash.com/photo-1518002171953-a080ee817e1f" alt="Adidas">
                    <h3>Blusa Originals</h3>
                    <p>R$ 289.90</p>
                    <button class="btn-add" onclick="addCarrinho('Blusa Originals', 289.90)">Adicionar</button>
                </div>

                <div class="card">
                    <span class="tag" style="background: var(--adidas)">ADIDAS</span>
                    <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b" alt="Adidas">
                    <h3>Camiseta 3-Stripes</h3>
                    <p>R$ 159.00</p>
                    <button class="btn-add" onclick="addCarrinho('Camiseta 3-Stripes', 159.00)">Adicionar</button>
                </div>

                <div class="card">
                    <span class="tag" style="background: var(--mizuno)">MIZUNO</span>
                    <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7" alt="Mizuno">
                    <h3>Moletom Training</h3>
                    <p>R$ 320.00</p>
                    <button class="btn-add" onclick="addCarrinho('Moletom Training', 320.00)">Adicionar</button>
                </div>

                <div class="card">
                    <span class="tag" style="background: var(--mizuno)">MIZUNO</span>
                    <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a" alt="Mizuno">
                    <h3>Tênis Wave Sky</h3>
                    <p>R$ 899.00</p>
                    <button class="btn-add" onclick="addCarrinho('Tênis Wave Sky', 899.00)">Adicionar</button>
                </div>
            </div>

            <aside class="carrinho">
                <h3>Meu Carrinho 🛒</h3>
                <div id="itens-lista">
                    <p style="color:#888; font-size: 0.8rem;">Carrinho vazio...</p>
                </div>
                <hr>
                <div style="display:flex; justify-content:space-between; font-weight:bold;">
                    <span>Total:</span>
                    <span id="total-carrinho">R$ 0,00</span>
                </div>
                <button style="width:100%; margin-top:15px; padding:10px; background:#000; color:#fff; border:none; border-radius:5px; cursor:pointer;">Finalizar Compra</button>
            </aside>
        </div>
    </div>

    <script>
        let carrinhoItens = [];
        let total = 0;

        function logar() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('shop-screen').style.display = 'block';
        }

        function addCarrinho(nome, preco) {
            carrinhoItens.push({nome, preco});
            total += preco;
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            const lista = document.getElementById('itens-lista');
            const totalTexto = document.getElementById('total-carrinho');
            
            lista.innerHTML = "";
            carrinhoItens.forEach((item) => {
                lista.innerHTML += `
                    <div class="item-carrinho">
                        <span>${item.nome}</span>
                        <span>R$ ${item.preco.toFixed(2)}</span>
                    </div>
                `;
            });

            totalTexto.innerText = `R$ ${total.toFixed(2)}`;
        }
    </script>
</body>
</html>
