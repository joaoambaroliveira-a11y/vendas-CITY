<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Concept Store | Cadastro</title>
    <style>
        :root {
            --primary: #000000;
            --accent: #e67e22;
            --bg: #f4f4f4;
            --white: #ffffff;
            --success: #27ae60;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: var(--primary);
            color: var(--white);
            padding: 20px;
            text-align: center;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .registration-container {
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            margin: 50px 20px;
        }

        h2 { text-align: center; margin-top: 0; }
        p { text-align: center; color: #666; font-size: 14px; margin-bottom: 30px; }

        .form-group { margin-bottom: 15px; }
        
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #333;
            transform: scale(1.02);
        }

        .nike-logo {
            display: block;
            margin: 0 auto 20px;
            width: 60px;
        }
    </style>
</head>
<body>

<header>
    <h1>Sport Store</h1>
</header>

<div class="registration-container">
    <svg class="nike-logo" viewBox="0 0 24 24" fill="black"><path d="M21 7L7.5 15.5l-4.5-2V11l4.5 2L21 7z"></path></svg>
    
    <h2>Crie sua conta</h2>
    <p>Cadastre-se para acessar a coleção exclusiva da Nike.</p>

    <form action="https://www.nike.com.br" method="GET">
        <div class="form-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
        </div>

        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
            <label for="preferencia">Categoria de interesse</label>
            <select id="preferencia">
                <option value="casual">Casual / Lifestyle</option>
                <option value="corrida">Corrida / Performance</option>
                <option value="futebol">Futebol</option>
                <option value="basquete">Jordan / Basquete</option>
            </select>
        </div>

        <button type="submit" class="btn-submit">CADASTRAR E IR PARA A LOJA</button>
    </form>
</div>

</body>
</html>
